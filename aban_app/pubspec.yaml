name: aban_app
description: "Aban: Real-time Khutbah translation platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0 # Ensure compatible SDK version

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- UI & Theming ---
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # --- State Management & Architecture ---
  flutter_riverpod: ^2.5.1
  get_it: ^7.7.0
  dartz: ^0.10.1
  equatable: ^2.0.5

  # --- Routing ---
  go_router: ^14.1.4

  # --- Firebase Firebase ---
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  cloud_functions: ^5.1.3
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3

  # --- Location & Maps ---
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # --- Audio (ASR / TTS) ---
  just_audio: ^0.9.36 # For playing translated TTS audio
  record: ^5.1.2      # For capturing microphone audio locally for MT proxying

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/svgs/
