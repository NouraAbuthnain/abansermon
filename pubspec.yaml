name: abansermon
description: "Aban: Real-time Khutbah translation platform."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0 # Ensure compatible SDK version

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- UI & Theming ---
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  google_nav_bar: ^5.0.6

  # --- State Management & Architecture ---
  flutter_riverpod: ^2.5.1
  get_it: ^7.7.0
  dartz: ^0.10.1
  equatable: ^2.0.5

  # --- Routing ---
  go_router: ^14.1.4

  # --- Firebase Firebase ---
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  cloud_functions: ^5.6.2
  firebase_storage: ^12.3.2
  firebase_messaging: ^15.1.3
  flutter_bloc: ^8.1.3
  path_provider: ^2.0.15

  # --- Location & Maps ---
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  geocoding: ^3.0.0

  # --- Audio (ASR / TTS) ---
  just_audio: ^0.10.5 # For playing translated TTS audio
  record: ^6.2.0 # For capturing microphone audio locally for MT proxying
  shared_preferences: ^2.5.5
  easy_localization: ^3.0.8
  hydrated_bloc: ^9.1.5
  intl: ^0.20.2
  http: ^1.6.0
  flutter_dotenv: ^6.0.1
  adhan: ^2.0.0+1
  hijri: ^3.0.0
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
    - assets/images/mosquephotos/
    - assets/icons/
    - assets/svgs/
    - assets/i18n/
